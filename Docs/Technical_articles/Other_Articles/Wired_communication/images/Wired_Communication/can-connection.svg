<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">CANバスの接続例</title><desc id="desc">CAN_HとCAN_Lの幹線に複数のノードを接続し、両端に120オーム終端抵抗を置く図</desc>
  <style>.bg{fill:#fff}.panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}.node{fill:#fff;stroke:#334155;stroke-width:2.5}.wireh{fill:none;stroke:#dc2626;stroke-width:5}.wirel{fill:none;stroke:#2563eb;stroke-width:5}.branch{fill:none;stroke:#64748b;stroke-width:4}.term{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.label{fill:#0f172a;font:600 21px 'Noto Sans JP',sans-serif}.small{fill:#475569;font:400 17px 'Noto Sans JP',sans-serif}.pin{fill:#0f172a;font:700 18px 'Noto Sans JP',sans-serif}</style>
  <rect class="bg" width="1200" height="440" rx="20"/><rect class="panel" x="30" y="28" width="1140" height="380" rx="16"/>
  <text class="label" x="68" y="72">CAN：2本の差動バスに複数ノードを接続する</text><text class="small" x="68" y="101">幹線の両端だけに 120 Ω の終端抵抗を入れます。途中のノードには終端を追加しません。</text>
  <path class="wireh" d="M158 218H1050"/><path class="wirel" d="M158 270H1050"/><text class="pin" x="74" y="224">CAN_H</text><text class="pin" x="78" y="276">CAN_L</text>
  <g><path class="branch" d="M350 218V160M350 270V160"/><rect class="node" x="271" y="110" width="158" height="55" rx="10"/><text class="label" x="303" y="145">マイコン</text></g>
  <g><path class="branch" d="M610 218V160M610 270V160"/><rect class="node" x="529" y="110" width="162" height="55" rx="10"/><text class="label" x="553" y="145">モータ</text></g>
  <g><path class="branch" d="M870 218V160M870 270V160"/><rect class="node" x="787" y="110" width="166" height="55" rx="10"/><text class="label" x="814" y="145">センサー</text></g>
  <rect class="term" x="139" y="190" width="40" height="108" rx="7"/><rect class="term" x="1030" y="190" width="40" height="108" rx="7"/><text class="small" x="102" y="329">120 Ω</text><text class="small" x="1014" y="329">120 Ω</text><text class="small" x="77" y="370">※ CANトランシーバを介して、各ノードをバスへ接続します。</text>
</svg>
